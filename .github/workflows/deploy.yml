name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'club-empar/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ./club-empar

      - name: Build project
        run: npm run build
        working-directory: ./club-empar

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./club-empar/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4